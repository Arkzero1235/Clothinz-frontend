<div class="pointer-events-none fixed right-12 bottom-4 z-50 flex flex-col items-end md:right-16 md:bottom-6">

  <div
    class="pointer-events-auto flex h-[min(60vh,504px)] w-[min(92vw,380px)] flex-col overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-2xl transition-all duration-300 ease-out dark:border-slate-700 dark:bg-dark-primary"
    [ngClass]="isOpen ? 'mb-3 translate-y-0 scale-100 opacity-100' : 'pointer-events-none translate-y-3 scale-95 opacity-0'"
  >
    <div class="flex items-center justify-between bg-primary dark:bg-dark-primary px-4 py-3 text-white">
      <div>
        <p class="text-sm font-semibold">{{ 'chatbot.title' | translate }}</p>
        <p class="text-xs opacity-90">{{ 'chatbot.subtitle' | translate }}</p>
      </div>
      <button (click)="toggleChat()" class="rounded p-1 transition hover:bg-white/20" [attr.aria-label]="'chatbot.closeLabel' | translate">
        <span class="text-lg leading-none">&#10006;</span>
      </button>
    </div>

    <div class="flex-1 space-y-3 overflow-y-auto p-4 bg-white dark:bg-dark-primary">
      <ng-container *ngIf="messages.length === 0; else msgList">
        <p class="text-center text-gray-500 dark:text-gray-300 text-sm mt-4">{{ 'chatbot.welcome' | translate }}</p>
      </ng-container>

      <ng-template #msgList>
        <div *ngFor="let msg of messages">
          <div
            class="max-w-[90%] rounded-xl px-3 py-2 text-sm leading-6"
            [ngClass]="msg.role === 'user' 
              ? 'ml-auto bg-primary text-white' 
              : 'bg-gray-100 text-gray-800 dark:bg-slate-800 dark:text-slate-100' "
          >
            <p class="whitespace-pre-wrap">{{ msg.text }}</p>
          </div>

          <div *ngIf="msg.suggestions?.length" class="mt-2 space-y-2">
            <a *ngFor="let item of msg.suggestions" [href]="'/product-details/' + (item.slug || item.id)"
              class="block rounded-lg border border-gray-200 px-3 py-2 text-xs transition hover:border-primary hover:bg-gray-50 dark:border-slate-700 dark:hover:bg-slate-800">
              <p class="truncate font-medium text-gray-900 dark:text-white">{{ item.name }}</p>
              <p class="mt-1 text-primary">{{ item.price | number }} đ &bull; {{ 'chatbot.stock' | translate }}: {{ item.stock }}</p>
            </a>
          </div>
        </div>
      </ng-template>

      <div *ngIf="isLoading" class="max-w-[90%] rounded-xl bg-gray-100 px-3 py-2 text-sm text-gray-700 dark:bg-slate-800 dark:text-slate-200 italic">
        {{ 'chatbot.processing' | translate }}
      </div>
    </div>

    <div class="flex gap-2 border-t border-gray-200 p-3 dark:border-slate-700 bg-white dark:bg-dark-primary">
      <input
        type="text"
        class="h-10 flex-1 rounded-lg border border-gray-300 px-3 text-sm outline-none transition focus:border-primary dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100 dark:focus:border-primary"
        [placeholder]="'chatbot.inputPlaceholder' | translate"
        [(ngModel)]="input"
        (keydown.enter)="sendMessage()"
      />
      <button
        (click)="sendMessage()"
        [disabled]="isLoading || !input.trim()"
        class="flex h-10 items-center justify-center rounded-lg bg-primary px-4 text-sm font-medium text-white transition hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-50"
      >
        {{ 'chatbot.send' | translate }}
      </button>
    </div>
  </div>

  <button
    (click)="toggleChat()"
    class="pointer-events-auto flex size-14 items-center justify-center rounded-full bg-primary text-2xl text-white shadow-xl transition duration-300 hover:scale-105 hover:opacity-90 animate-pulse"
    [attr.aria-label]="'chatbot.openLabel' | translate"
  >
    <span>&#128172;</span>
  </button>
</div>
