<app-navbar/>

<app-breadcrumb
    [title]="'shop.shipping.title' | translate"
    [items]="[{ label: ('nav.home' | translate), link: '/' }, { label: ('shop.shipping.title' | translate) }]"
/>

 <div class="s-py-100">
    <div class="container">
        <div class="max-w-[940px] mx-auto">
            <div class="max-w-xl mb-8 md:mb-12" data-aos="fade-up">
                <div>
                    <i class="mdi mdi-truck-delivery text-6xl text-primary block"></i>
                </div>
                <h3 class="font-medium leading-none mt-4 md:mt-6 text-2xl md:text-3xl">{{ 'shop.shipping.deliveryOption' | translate }}</h3>
                <p class="mt-3">{{ 'shop.shipping.deliveryDesc' | translate }}</p>
            </div>
            <div class="overflow-x-auto border-b border-dashed border-primary pb-6 md:pb-10" data-aos="fade-up" data-aos-delay="100">
                <app-shipping-methods-table />
            </div>
            <div class="mt-8 md:mt-12">
                <h3 class="font-medium leading-none text-2xl md:text-3xl" data-aos="fade-up">{{ 'shop.shipping.rulesTitle' | translate }}</h3>
                <p class="text-base sm:text-lg mt-3 md:mt-4" data-aos="fade-up" data-aos-delay="100">{{ 'shop.shipping.rulesDesc' | translate }}</p>
            </div>
        </div>
    </div>
</div>

<app-footer/>
