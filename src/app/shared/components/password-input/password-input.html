<div class="relative flex items-center">
  <input
    [type]="showPassword() ? 'text' : 'password'"
    [formControl]="control()"
    [placeholder]="placeholder()"
    class="w-full h-12 md:h-14 bg-white dark:bg-transparent border border-bdr-clr focus:border-primary p-4 pr-12 outline-none duration-300 placeholder:text-xl placeholder:transform placeholder:translate-y-[10px]"
  />
  <button
    type="button"
    (click)="togglePasswordVisibility()"
    class="absolute right-4 text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-primary focus:outline-none flex items-center justify-center"
  >
    @if (showPassword()) {
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    } @else {
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
    }
  </button>
</div>
@if (errorMessage()) {
  <span class="text-red-500 text-sm mt-1 block">{{ errorMessage() }}</span>
}
