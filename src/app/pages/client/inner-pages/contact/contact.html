<app-navbar/>

<app-breadcrumb
    [title]="'contact.title' | translate"
    [items]="[{ label: ('nav.home' | translate), link: '/' }, { label: ('contact.title' | translate) }]"
/>

<div class="s-pb-100 s-pt-100">
    <div class="container-fluid">
        <div class="max-w-[1720px] mx-auto flex justify-center">
            <div class="max-w-[725px] w-full mx-auto">
                <div data-aos="fade-up">
                    <h3 class="leading-none font-medium mt-3 md:mt-6 text-2xl">{{ 'contact.heading' | translate }}</h3>
                    <p class="max-w-[474px] mt-3 md:mt-4 font-medium">{{ 'contact.subtitle' | translate }}</p>
                </div>
                <div class="mt-8" data-aos="fade-up" data-aos-delay="100">
                    <div>
                        <div class="grid sm:grid-cols-2 lg:grid-cols-1 xl:grid-cols-2 gap-5 sm:gap-6">
                            @for (field of contactFields(); track field.labelKey) {
                                <div>
                                    <label class="text-base md:text-lg text-title dark:text-white leading-none mb-2.5 block">{{ field.labelKey | translate }}</label>
                                    <input class="w-full h-12 md:h-14 bg-snow dark:bg-dark-secondary border border-[#E3E5E6] text-title dark:text-white focus:border-primary p-4 outline-none duration-300" [type]="field.type" [placeholder]="field.placeholderKey | translate">
                                </div>
                            }
                            <div>
                                <label class="text-base md:text-lg text-title dark:text-white leading-none mb-2.5 block">{{ 'contact.subject' | translate }}</label>
                                <select class="w-full h-12 md:h-14 bg-snow dark:bg-dark-secondary border border-[#E3E5E6] text-title dark:text-white focus:border-primary px-4 outline-none duration-300">
                                    @for (option of subjectOptions(); track option.value) {
                                        <option [value]="option.value">{{ option.labelKey | translate }}</option>
                                    }
                                </select>
                            </div>
                        </div>
                        <div class="mt-5 sm:gap-6">
                            <label class="text-base md:text-lg text-title dark:text-white leading-none mb-2.5 block">{{ 'contact.message' | translate }}</label>
                            <textarea class="w-full h-28 md:h-[170px] bg-snow dark:bg-dark-secondary border border-[#E3E5E6] text-title dark:text-white focus:border-primary p-4 outline-none duration-300" name="Message" [placeholder]="'contact.messagePlaceholder' | translate"></textarea>
                        </div>
                        <app-button
                            color="btn-solid"
                            padding="mt-5"
                            [text]="'contact.submit' | translate"
                        />
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="s-pb-100" data-aos="fade-up">
    <div class="container-fluid">
        <div class="max-w-[1720px] mx-auto">
            <iframe class="w-full h-[400px] md:h-[600px]" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d59587.97705906535!2d105.80467082614198!3d21.02276800000001!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3135ab9bd9861ca1%3A0xe7887f7b72ca17a!2zSMOgIE7hu5lpLCBWaWV0bmFt!5e0!3m2!1sen!2s!4v1707382800000!5m2!1sen!2s" style="border:0;"></iframe>
        </div>
    </div>
</div>

<app-footer/>
