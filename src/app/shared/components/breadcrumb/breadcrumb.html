<div
  class="flex items-center gap-4 flex-wrap bg-overlay p-14 sm:p-16 before:bg-title before:bg-opacity-70"
  [style.background-image]="'url(' + backgroundImage() + ')'"
>
  <div class="text-center w-full">
    <h2 class="text-white text-8 md:text-[40px] font-normal leading-none text-center">{{ title() }}</h2>
    <ul class="flex items-center justify-center gap-[10px] text-base md:text-lg leading-none font-normal text-white mt-3 md:mt-4 flex-wrap">
      @for (item of items(); track item.label; let last = $last) {
        @if (item.link && !last) {
          <li><a [routerLink]="item.link">{{ item.label }}</a></li>
        } @else {
          <li class="text-primary">{{ item.label }}</li>
        }
        @if (!last) {
          <li>/</li>
        }
      }
    </ul>
  </div>
</div>
