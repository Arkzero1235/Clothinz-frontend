<app-navbar/>

<app-breadcrumb
  [title]="'shop.paymentSuccess.title' | translate"
  [items]="[{ label: ('nav.home' | translate), link: '/' }, { label: ('shop.paymentSuccess.title' | translate) }]"
/>

<div class="s-py-100">
  <div class="container">
    <div class="max-w-[700px] mx-auto text-center" data-aos="fade-up">
      <app-payment-result-card
        iconBgClass="bg-green-500"
        [iconPath]="successIconPath"
        titleKey="shop.paymentSuccess.heading"
        messageKey="shop.paymentSuccess.message"
        [details]="paymentDetails()"
      >
        @if (orderId()) {
          <app-button
            actions
            color="btn-theme-solid"
            [text]="'shop.paymentSuccess.viewInvoice' | translate"
            routerLink="/invoice"
            [queryParams]="{orderId: orderId()}" />
        }
        <app-button
          actions
          color="btn-secondary-solid"
          [text]="'shop.paymentSuccess.viewOrders' | translate"
          routerLink="/order-history" />
        <app-button
          actions
          color="btn-outline"
          [text]="'shop.cart.continue' | translate"
          routerLink="/shop" />
      </app-payment-result-card>
    </div>
  </div>
</div>

<app-footer/>
