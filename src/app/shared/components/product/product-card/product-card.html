<div [class]="classList()">
  @for (item of productList(); track item.id) {
    @if (variant() === 'default') {
      <div class="sixdo-product-card group border border-bdr-clr dark:border-bdr-clr-drk rounded-xl overflow-hidden bg-white dark:bg-dark-secondary">
        <div class="relative overflow-hidden aspect-2-3 rounded-t-xl">
          <a [routerLink]="['/product-details',item.slug || item.id]" class="block w-full h-full">
            <img class="w-full h-full object-cover transform group-hover:scale-110 duration-300" [src]="item.thumbnail" [alt]="item.name">
          </a>
          <div class="absolute z-10 top-4 right-4 opacity-0 duration-300 transition-all group-hover:opacity-100 group-hover:translate-y-0 -translate-y-2 flex flex-col items-end gap-2">
            @if (actionsTemplate()) {
              <ng-container *ngTemplateOutlet="actionsTemplate(); context: { $implicit: item }" />
            } @else {
              <button (click)="toggleWishlist(item, $event)" class="sixdo-card-action-btn" [attr.aria-label]="isInWishlist(item.id) ? ('product.inWishlist' | translate) : ('wishlist.add' | translate)">
                <i [class]="isInWishlist(item.id) ? 'mdi mdi-cards-heart text-[20px] text-red-500' : 'mdi mdi-cards-heart-outline text-[20px]'"></i>
              </button>
              <button (click)="addToCart(item, $event)" class="sixdo-card-action-btn" [attr.aria-label]="'product.addToCart' | translate">
                <i class="mdi mdi-shopping-outline text-[20px]"></i>
              </button>
              <button (click)="quickView(item, $event)" class="sixdo-card-action-btn quick-view" [attr.aria-label]="'product.quickView' | translate">
                <i class="mdi mdi-eye-outline text-[20px]"></i>
              </button>
            }
          </div>
        </div>
        <div class="md:px-2 lg:px-4 xl:px-6 lg:pt-6 pt-5 pb-5 sm:pb-6 flex gap-4 md:gap-5 flex-col">
          <div>
            <h5 class="font-normal dark:text-white text-lg sm:text-xl leading-[1.5]">
              <a [routerLink]="['/product-details',item.slug || item.id]" class="text-underline block truncate">{{item.name}}</a>
            </h5>
            <app-rating [rating]="0" [showStock]="true" [stock]="item.stock" class="mt-1" />
          </div>
          <h4 class="font-medium leading-none dark:text-white text-base sm:text-lg">{{formatVND(item.price)}}₫</h4>
        </div>
      </div>
    }
    @if (variant() === 'compact') {
      <div class="relative overflow-hidden group border border-bdr-clr dark:border-bdr-clr-drk rounded-xl bg-white dark:bg-dark-secondary">
        <a [routerLink]="['/product-details',item.slug || item.id]">
          <img class="w-full transform duration-300 group-hover:scale-110" [src]="item.thumbnail" [alt]="item.name">
        </a>
        <div class="flex flex-col items-start gap-3 md:gap-4 absolute z-20 w-11/12 bottom-3 xl:bottom-5 left-[4%] p-4 xl:p-5 bg-white dark:bg-title bg-opacity-[85%] dark:bg-opacity-[85%] group-hover:-translate-y-1/2 duration-500 group-hover:opacity-0 group-hover:invisible">
          <h4 class="font-medium leading-none dark:text-white text-base sm:text-lg">{{formatVND(item.price)}}₫</h4>
          <div>
            <h5 class="font-normal dark:text-white text-paragraph leading-[1.5]">
              <a [routerLink]="['/product-details', item.slug || item.id]">
                {{item.name}}
              </a>
            </h5>
            <app-rating [rating]="4" [showStock]="true" [stock]="item.stock" class="mt-1" />
          </div>
        </div>
        <div class="absolute z-10 flex gap-2 justify-center bottom-5 md:bottom-7 w-full transform translate-y-5 opacity-0 duration-500 invisible group-hover:translate-y-0 group-hover:opacity-100 group-hover:visible">
          <button (click)="toggleWishlist(item, $event)" class="w-9 lg:w-12 h-9 p-2 lg:h-12 bg-white dark:bg-title bg-opacity-80 flex items-center justify-center relative tooltip-icon rounded-full">
            <i [class]="isInWishlist(item.id) ? 'mdi mdi-cards-heart dark:text-white text-[24px] text-red-500' : 'mdi mdi-cards-heart-outline dark:text-white text-[24px]'"></i>
            <span class="p-2 bg-white dark:bg-title text-xs text-title dark:text-white absolute -top-[60px] left-1/2 whitespace-nowrap rounded-[4px] opacity-0 invisible duration-300" style="transform: translateX(-50%)">{{ isInWishlist(item.id) ? ('product.inWishlist' | translate) : ('wishlist.add' | translate) }}
              <span class="w-3 h-3 bg-white dark:bg-title absolute -bottom-[6px] left-1/2 rotate-45" style="transform: translateX(-50%)"></span>
            </span>
          </button>
          <button (click)="addToCart(item, $event)" class="w-9 lg:w-12 h-9 p-2 lg:h-12 bg-white dark:bg-title bg-opacity-80 flex items-center justify-center relative tooltip-icon rounded-full">
            <i class="mdi mdi-shopping-outline dark:text-white text-[24px]"></i>
            <span class="p-2 bg-white dark:bg-title text-xs text-title dark:text-white absolute -top-[60px] left-1/2 whitespace-nowrap rounded-[4px] opacity-0 invisible duration-300" style="transform: translateX(-50%)">{{ 'product.addToCart' | translate }}
              <span class="w-3 h-3 bg-white dark:bg-title absolute -bottom-[6px] left-1/2 rotate-45" style="transform: translateX(-50%)"></span>
            </span>
          </button>
          <button (click)="quickView(item, $event)" class="w-9 lg:w-12 h-9 p-2 lg:h-12 bg-white dark:bg-title bg-opacity-80 flex items-center justify-center relative quick-view tooltip-icon rounded-full">
            <i class="mdi mdi-eye-outline dark:text-white text-[24px]"></i>
            <span class="p-2 bg-white dark:bg-title text-xs text-title dark:text-white absolute -top-[60px] left-1/2 whitespace-nowrap rounded-[4px] opacity-0 invisible duration-300" style="transform: translateX(-50%)">{{ 'product.quickView' | translate }}
              <span class="w-3 h-3 bg-white dark:bg-title absolute -bottom-[6px] left-1/2 rotate-45" style="transform: translateX(-50%)"></span>
            </span>
          </button>
        </div>
      </div>
    }
  }
</div>
