<div [class]="containerClass()">
  <span [class]="iconClass()">{{ icon() }}</span>
  <p class="mt-3 text-base text-title/40 dark:text-white/40">{{ message() | translate }}</p>
  @if (actionText() && actionLink()) {
    <a 
      [routerLink]="actionLink()" 
      class="mt-4 inline-block px-6 py-2 bg-primary text-white rounded-md hover:bg-primary/90 transition-colors"
    >
      {{ actionText() | translate }}
    </a>
  }
</div>
